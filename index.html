<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aureli Automation Labs — AI voice and chat automations for local businesses." />
    <title>Aureli Automation Labs | AI for Local Businesses</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <!-- Retell Widget -->
    <script
      id="retell-widget"
      src="https://dashboard.retellai.com/retell-widget.js"
      type="module"
      data-public-key="%VITE_RETELL_PUBLIC_KEY%"
      data-agent-id="%VITE_RETELL_AGENT_ID%"
      data-agent-version="V0"
      data-title="Aureli Bot"
      data-logo-url="%VITE_RETELL_LOGO_URL%"
      data-color="#7c3aed"
      data-bot-name="Aureli Bot"
      data-popup-message="Hello! Would you like any assistance?"
      data-show-ai-popup="true"
      data-show-ai-popup-time="5"
      data-auto-open="false"
      data-dynamic='{"key": "value"}'
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- tsParticles -->
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
    <!-- Vanilla Tilt -->
    <script src="https://cdn.jsdelivr.net/npm/vanilla-tilt@1.8.1/dist/vanilla-tilt.min.js"></script>
    <!-- AOS -->
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  </body>
</html>
